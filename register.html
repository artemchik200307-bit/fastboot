<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080c12">
  <title>FASTBOOT — Регистрация</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-info">
      <a class="auth-brand" href="index.html">FASTBOOT</a>
      <div class="auth-info-main">
        <span class="auth-kicker">CREATE FASTBOOT ACCOUNT</span>
        <h1>Создайте единый аккаунт для торговли и AI-бота</h1>
        <p>После регистрации откроется личный кабинет с портфелем, терминалом и настройками торгового бота.</p>
      </div>
      <span class="auth-note">Регистрация защищена Supabase Auth</span>
    </section>

    <section class="auth-form-wrap">
      <article class="auth-card">
        <h2>Регистрация</h2>
        <p>Создайте новый аккаунт FASTBOOT.</p>

        <form id="registerForm" class="auth-form">
          <label>
            Имя пользователя
            <input id="registerName" type="text" required minlength="3" maxlength="24" autocomplete="username">
          </label>

          <label>
            Email
            <input id="registerEmail" type="email" required autocomplete="email" inputmode="email">
          </label>

          <label>
            Пароль
            <input id="registerPassword" type="password" required minlength="8" autocomplete="new-password">
          </label>

          <label>
            Повторите пароль
            <input id="registerPasswordRepeat" type="password" required minlength="8" autocomplete="new-password">
          </label>

          <div id="authError" class="auth-error" role="alert"></div>
          <button class="auth-submit" type="submit">Создать аккаунт</button>
        </form>

        <div class="auth-switch">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="register.js"></script>
</body>
</html>
